---
# Deploy auf einem typischen LAMP-Webspace mit SSH-Zugang (z. B. Ionos und
# Konsorten): kein root/sudo, kein systemd, kein eigener vhost. Einmalige,
# manuelle Vorbereitung siehe ansible/README.md.
- name: Deploy Lift2Event
  hosts: webserver
  vars_files:
    - vars/main.yml

  tasks:
    - name: Pruefen, ob .env auf dem Server existiert
      ansible.builtin.stat:
        path: "{{ deploy_path }}/.env"
      register: env_file

    - name: Abbrechen, falls .env fehlt
      ansible.builtin.fail:
        msg: >-
          {{ deploy_path }}/.env fehlt. Einmalig manuell anlegen
          (.env.example kopieren und DB-/SMTP-Zugangsdaten eintragen).
          APP_KEY kann leer bleiben, wird unten automatisch erzeugt.
      when: not env_file.stat.exists

    - name: Code auschecken/aktualisieren
      ansible.builtin.git:
        repo: "{{ git_repo }}"
        dest: "{{ deploy_path }}"
        version: "{{ deploy_branch }}"

    # Composer und npm sind auf vielen Webspace-Paketen nicht installiert,
    # PHP dagegen schon. Vendor- und Frontend-Build entstehen deshalb lokal
    # auf dem Ansible-Steuerrechner (wo composer_bin/npm_bin existieren) und
    # werden anschliessend per rsync auf den Server uebertragen.
    - name: PHP- und Frontend-Abhaengigkeiten lokal bauen und uebertragen
      block:
        - name: Temporaeres Build-Verzeichnis anlegen
          ansible.builtin.tempfile:
            state: directory
            prefix: lift2event-build-
          register: build_dir
          delegate_to: localhost
          become: false

        - name: Code fuer den Build auschecken
          ansible.builtin.git:
            repo: "{{ git_repo }}"
            dest: "{{ build_dir.path }}"
            version: "{{ deploy_branch }}"
          delegate_to: localhost
          become: false

        - name: PHP-Abhaengigkeiten lokal installieren
          ansible.builtin.command: "{{ composer_bin }} install --no-dev --optimize-autoloader --no-interaction"
          args:
            chdir: "{{ build_dir.path }}"
          delegate_to: localhost
          become: false

        # Vite, Tailwind & Co. stehen absichtlich in devDependencies und
        # werden nur zum Bauen benoetigt - daher hier bewusst kein --omit=dev.
        - name: Frontend-Abhaengigkeiten lokal installieren
          ansible.builtin.command: "{{ npm_bin }} ci"
          args:
            chdir: "{{ build_dir.path }}"
          delegate_to: localhost
          become: false

        - name: Frontend lokal fuer Produktion bauen
          ansible.builtin.command: "{{ npm_bin }} run build"
          args:
            chdir: "{{ build_dir.path }}"
          delegate_to: localhost
          become: false

        - name: vendor/-Verzeichnis auf den Server uebertragen
          ansible.posix.synchronize:
            src: "{{ build_dir.path }}/vendor/"
            dest: "{{ deploy_path }}/vendor/"
            delete: yes

        - name: Gebaute Frontend-Assets auf den Server uebertragen
          ansible.posix.synchronize:
            src: "{{ build_dir.path }}/public/build/"
            dest: "{{ deploy_path }}/public/build/"
            delete: yes
      always:
        - name: Lokales Build-Verzeichnis aufraeumen
          ansible.builtin.file:
            path: "{{ build_dir.path }}"
            state: absent
          delegate_to: localhost
          become: false
          when: build_dir is defined and build_dir.path is defined

    - name: Storage-Verzeichnisstruktur sicherstellen
      ansible.builtin.file:
        path: "{{ deploy_path }}/{{ item }}"
        state: directory
        mode: "0775"
      loop:
        - storage/app/public
        - storage/framework/cache/data
        - storage/framework/sessions
        - storage/framework/testing
        - storage/framework/views
        - storage/logs
        - bootstrap/cache

    - name: Pruefen, ob APP_KEY bereits gesetzt ist
      ansible.builtin.command: grep -q '^APP_KEY=.\+' .env
      args:
        chdir: "{{ deploy_path }}"
      register: app_key_present
      changed_when: false
      failed_when: false

    - name: APP_KEY erzeugen, falls noch leer
      ansible.builtin.command: "{{ php_bin }} artisan key:generate --force"
      args:
        chdir: "{{ deploy_path }}"
      when: app_key_present.rc != 0

    - name: Symlink fuer oeffentliche Storage-Dateien anlegen
      ansible.builtin.command: "{{ php_bin }} artisan storage:link"
      args:
        chdir: "{{ deploy_path }}"
      register: storage_link
      changed_when: "'already exists' not in storage_link.stdout"

    - name: Wartungsmodus, Migration und Caches
      block:
        - name: Wartungsmodus aktivieren
          ansible.builtin.command: "{{ php_bin }} artisan down"
          args:
            chdir: "{{ deploy_path }}"

        - name: Alte Caches verwerfen
          ansible.builtin.command: "{{ php_bin }} artisan optimize:clear"
          args:
            chdir: "{{ deploy_path }}"

        - name: Datenbankmigrationen ausfuehren
          ansible.builtin.command: "{{ php_bin }} artisan migrate --force"
          args:
            chdir: "{{ deploy_path }}"

        - name: Config cachen
          ansible.builtin.command: "{{ php_bin }} artisan config:cache"
          args:
            chdir: "{{ deploy_path }}"

        - name: Routen cachen
          ansible.builtin.command: "{{ php_bin }} artisan route:cache"
          args:
            chdir: "{{ deploy_path }}"

        - name: Views cachen
          ansible.builtin.command: "{{ php_bin }} artisan view:cache"
          args:
            chdir: "{{ deploy_path }}"
      always:
        - name: Wartungsmodus deaktivieren
          ansible.builtin.command: "{{ php_bin }} artisan up"
          args:
            chdir: "{{ deploy_path }}"

    - name: Schreibrechte fuer Storage und Cache setzen
      ansible.builtin.file:
        path: "{{ deploy_path }}/{{ item }}"
        mode: "0775"
        recurse: yes
      loop:
        - storage
        - bootstrap/cache
