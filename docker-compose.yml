services:

  app:
    build: docker/php
    volumes:
      - .:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-secret}"
      MARIADB_DATABASE: "${DB_DATABASE:-lift2event}"
      MARIADB_USER: "${DB_USERNAME:-lift2event}"
      MARIADB_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

  node:
    image: node:20-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - app

volumes:
  db_data:
